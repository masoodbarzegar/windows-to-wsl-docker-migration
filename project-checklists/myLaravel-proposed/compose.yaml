# PROPOSED canonical WSL Compose file for myLaravel.
# Staged here for review/validation only -- not yet placed in the destination,
# because the real file copy has not happened yet (dry-run only so far).
# Adapted from compose.mysql-laravel.example.yaml against this project's ACTUAL
# original docker-compose.yml (services, ports, credentials) -- not a blind copy.

name: mylaravel_wsl   # explicit + unique: distinguishes from the old, unrelated
                      # "mylaravel" Docker project already on record (different
                      # source path, already stopped, untouched by this migration)

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - ./src:/var/www/html
    # Original published php-fpm's raw port directly to the host. Nothing in this
    # stack appears to need that (nginx reaches app over the internal network),
    # but it's preserved by default to match existing behavior -- reconsider
    # dropping it once the migration is validated.
    ports:
      - "${APP_FPM_PORT:-9000}:9000"
    depends_on:
      db:
        condition: service_healthy

  node:
    build:
      context: ./src
      dockerfile: ../docker/node/Dockerfile
    working_dir: /app
    volumes:
      - ./src:/app
    ports:
      - "${VITE_DEV_PORT:-5174}:5174"
    command: npm run dev

  webserver:
    image: nginx:1.25
    volumes:
      - ./src:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "${WEB_HTTP_PORT:-80}:80"
    depends_on:
      - app

  db:
    # Pinned explicitly -- never the floating "mysql:8" tag (see myLaravel.md §2/§4 for why:
    # a datadir-recovery attempt against the ORIGINAL image, at the SAME digest, still failed
    # due to a lower_case_table_names mismatch baked into the original data dictionary --
    # that was never actually a version-drift problem). This service starts on a FRESH,
    # empty named volume (below) and gets populated by restoring the logical dump produced
    # from the old datadir under a temporary, one-off container -- see the restore workflow
    # note under `volumes:`. Because restore goes through a logical dump/reload rather than
    # reusing the raw datadir files, this service is deliberately NOT required to match the
    # original's exact version or its lower_case_table_names=2 setting.
    image: mysql:8.4.5
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_DATABASE:-laravel}
      MYSQL_USER: ${DB_USERNAME:-laravel}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    # Deliberately no `command: --lower-case-table-names=2` here. This fresh volume gets the
    # normal Linux default (0, case-sensitive). Only add it back, explicitly and documented,
    # if restoring the dump reveals the application's schema actually depends on
    # case-insensitive table-name matching -- don't carry the old setting forward by default.
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", 'mysqladmin ping -h 127.0.0.1 -u root -p"$$MYSQL_ROOT_PASSWORD" --silent']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    # Host port intentionally NOT published by default -- app/node/phpmyadmin all
    # reach this service over the internal network as "db". Uncomment only if a
    # host-side tool genuinely needs direct access:
    # ports:
    #   - "${DB_PORT:-3306}:3306"

  phpmyadmin:
    image: phpmyadmin:5.2.1   # pinned; re-pin if a different tested version is preferred
    profiles:
      - tools
    environment:
      PMA_HOST: db
      PMA_USER: ${DB_USERNAME:-laravel}
      PMA_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "${PHPMYADMIN_PORT:-8081}:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  # Plain (non-external) declaration: this is a NEW volume for the WSL stack.
  # Unlike the laravelLivewireAdmin pilot, there is no pre-existing WSL-side
  # Docker volume to adopt here -- the Windows-side data lives in a bind-mounted
  # dbdata/ folder, not a Docker volume, so there's nothing to mark `external`.
  #
  # Intended restore workflow (manual, not part of `docker compose up`, not yet performed):
  #   a. Temporarily open a COPY of the old datadir (never the original) in a one-off,
  #      disconnected container using the *original* image/digest and the matching
  #      --lower-case-table-names=2 flag it actually needs.
  #   b. Take a logical dump (mysqldump) from that temporary container; stop/remove it.
  #   c. `docker compose up -d db` here to initialize this volume fresh (normal Linux defaults).
  #   d. Restore the logical dump into this fresh volume (`docker exec ... mysql < dump.sql`).
  #   e. Run the stack normally from here on -- only reintroduce lower_case_table_names=2
  #      on this service, explicitly and documented, if restore/validation shows the schema
  #      actually needs it.
  dbdata:
