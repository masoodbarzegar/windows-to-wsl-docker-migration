# PROPOSED canonical WSL Compose file for myLaravelReactNew.
# Reused directly from the validated myLaravel/myLaravelReact migrations -- only
# project-specific differences changed (see project-checklists/myLaravelReactNew.md).

name: mylaravelreactnew_wsl

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - ./src:/var/www/html
    ports:
      - "${APP_FPM_PORT:-9000}:9000"
    depends_on:
      db:
        condition: service_healthy

  node:
    build:
      context: ./src
      dockerfile: ../docker/node/Dockerfile
    working_dir: /app
    volumes:
      - ./src:/app
    ports:
      - "${VITE_DEV_PORT:-5173}:5173"
    # Original has no CMD in its Dockerfile and no active `command:` here either --
    # `tty: true` is what keeps the container alive (falls through to the base image's
    # default). Net effect matches myLaravel/myLaravelReact: no dev server auto-start.
    tty: true

  webserver:
    image: nginx:1.25
    volumes:
      - ./src:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "${WEB_HTTP_PORT:-80}:80"
    depends_on:
      - app

  db:
    image: mysql:8.4.5
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_DATABASE:-laravel}
      MYSQL_USER: ${DB_USERNAME:-laravel}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", 'mysqladmin ping -h 127.0.0.1 -u root -p"$$MYSQL_ROOT_PASSWORD" --silent']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    # ports:
    #   - "${DB_PORT:-3306}:3306"

  phpmyadmin:
    image: phpmyadmin:5.2.1
    profiles:
      - tools
    environment:
      PMA_HOST: db
      PMA_USER: ${DB_USERNAME:-laravel}
      PMA_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "${PHPMYADMIN_PORT:-8081}:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  dbdata:
