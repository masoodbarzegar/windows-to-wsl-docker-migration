# Generic Laravel + PHP-FPM + Nginx + PostgreSQL template.
# Sibling of compose.mysql-laravel.example.yaml -- same standard, Postgres-specific
# service definitions. See COMPOSE-STANDARD.md for the rules this file follows.
#
# This is a STANDARD to adapt, not a file to use unmodified. Every line
# marked CHANGE-ME needs a project-specific value. See README.md.

name: ${COMPOSE_PROJECT_NAME:-changeme_wsl}   # CHANGE-ME: unique per project, e.g. myproject_wsl

services:
  app:
    build: ./docker/php            # CHANGE-ME: path to this project's PHP-FPM Dockerfile
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html        # CHANGE-ME: path to this project's application source
    environment:
      - COMPOSER_ALLOW_SUPERUSER=1
    # Optional: only include this port if the app container also runs a
    # Node/Vite dev server. Remove it entirely if this project has no
    # frontend dev server running inside the app container.
    ports:
      - "${VITE_PORT:-5173}:5173"
    depends_on:
      db:
        condition: service_healthy   # app talks to the DB directly -> wait for real health, not just "started"

  web:
    image: nginx:latest              # consider pinning a specific tag once validated for this project
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf   # CHANGE-ME if your nginx config lives elsewhere
    ports:
      - "${APP_PORT:-8080}:80"       # the primary host-facing port for this project
    depends_on:
      - app                          # web only proxies to app; no healthcheck on app yet, so start-order only

  db:
    image: postgres:16-alpine
    environment:
      # Compose-side vars (DB_*) come from .env.docker; Postgres needs its own
      # POSTGRES_* names, so they're translated here rather than renamed globally.
      # Note: Postgres has a single superuser (POSTGRES_USER), not a separate
      # root account like MySQL -- DB_ROOT_PASSWORD from .env.docker.example
      # does not apply to this template.
      POSTGRES_DB: ${DB_DATABASE:-app}
      POSTGRES_USER: ${DB_USERNAME:-app}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      # $$ is intentional: it's how Compose escapes a literal `$` so the
      # variable is expanded by the container's own shell (using the
      # POSTGRES_USER/POSTGRES_DB already set above), not by Compose at parse time.
      test: ["CMD-SHELL", 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    # Host port intentionally NOT published by default (rule 7). app/pgadmin
    # reach this service over the internal network as "db". Uncomment only if
    # a host-side tool genuinely needs direct access:
    # ports:
    #   - "${DB_PORT:-5432}:5432"

  pgadmin:
    image: dpage/pgadmin4:8.12   # CHANGE-ME: re-pin to whatever version you've actually tested, if different
    profiles:
      - tools                   # `docker compose up -d` never starts this; requires --profile tools
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-8082}:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  dbdata:
    # Leave as a plain declaration (above) for a brand-new project -- Compose
    # will create and manage the volume normally.
    #
    # Uncomment BOTH lines below ONLY when this migration is deliberately
    # reusing an existing volume that already has real data in it (see rule
    # 10 in COMPOSE-STANDARD.md). Compose will then refuse to start if that
    # volume doesn't already exist, instead of silently creating an empty one.
    # external: true
    # name: changeme_existing_volume_name
